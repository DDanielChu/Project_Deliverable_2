<!-- Sets customer info -->

{% extends "layout.html" %}
{% block content %}

<div style="max-width:380px; margin:60px auto;">
  <h1>Customer Login</h1>
  <div class="form-box">
    <form method="POST">
      <div class="form-group" style="margin-bottom:15px;">
        <label>Customer ID</label>
        <input type="number" name="customer_id" required placeholder="Enter your customer ID">
      </div>
      <button class="btn button" style="width:100%;">Login</button>
    </form>
    <p style="margin-top:15px; font-size:0.85em; color:#777;">Don't have an account? Ask an employee to register you.</p>
  </div>
  <a href="{{ url_for('home') }}"><- Back</a>
</div>

{% endblock %}
